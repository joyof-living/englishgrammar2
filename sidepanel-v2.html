<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>에스보냥 (SVOCAt)</title>
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="analysis-v2.css">
  <link rel="stylesheet" href="sidepanel-v2-extra.css">
</head>
<body>
  <div class="sp2-root">

    <!-- 헤더 (제목바와 중복 방지: 마스코트 + 액션만) -->
    <header class="sp2-header">
      <div class="sp2-brand">
        <div class="sp2-mascot" id="header-mascot"></div>
      </div>
      <div class="sp2-actions">
        <button class="sp2-icon" id="history-btn" title="최근 분석">🕘</button>
        <button class="sp2-icon" id="settings-btn" title="설정">⚙</button>
      </div>
    </header>

    <!-- 히스토리 패널 (기본 숨김) -->
    <div class="sp2-history" id="history-panel" hidden>
      <div class="sp2-history-head">
        <span class="sp2-history-title">최근 분석</span>
        <button class="sp2-history-close" id="history-close" title="닫기">✕</button>
      </div>
      <div class="sp2-history-list" id="history-list"></div>
    </div>

    <!-- 본문 (JS 가 상태별 콘텐츠 주입) -->
    <main class="sp2-body" id="sp2-body"></main>

  </div>

  <script src="mascot.js"></script>
  <script src="sidepanel-v2.js"></script>
</body>
</html>
