<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>에스보냥 (SVOCAt)</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="app">

    <!-- ── 헤더 ── -->
    <header class="header">
      <div class="header-left">
        <span class="logo">🐱</span>
        <div>
          <div class="title">에스보냥</div>
          <div class="subtitle">SVOCAt · 영어 문법 분석기</div>
        </div>
      </div>
      <div class="header-right">
        <button id="history-btn" class="icon-btn" title="분석 히스토리">🕘</button>
        <button id="api-btn" class="icon-btn" title="설정">⚙</button>
      </div>
    </header>

    <!-- ── 히스토리 패널 ── -->
    <div id="history-panel" class="history-panel" style="display:none">
      <div class="history-header">
        <span class="section-title">최근 분석</span>
        <button id="history-close" class="history-close">✕</button>
      </div>
      <div id="history-list" class="history-list"></div>
    </div>

    <!-- ── 빈 상태: API 키 설정됨 ── -->
    <div id="state-empty" class="state" style="display:none">
      <div class="empty-icon">📖</div>
      <p class="empty-text">웹페이지에서 영어 문장을 선택하면<br>자동으로 분석을 시작합니다.</p>
      <p class="empty-hint">최대 300 단어까지 분석 가능합니다.</p>
    </div>

    <!-- ── 빈 상태: API 키 미설정 ── -->
    <div id="state-no-key" class="state" style="display:none">
      <div class="empty-icon">🔑</div>
      <p class="empty-text"><strong>시작하려면 API 키가 필요합니다</strong></p>
      <p class="empty-hint">무료로 발급받을 수 있습니다 (1~2분 소요)</p>
      <button id="open-welcome-btn" class="link-btn" style="margin-top: 10px">시작하기 →</button>
    </div>

    <!-- ── 로딩 상태 (섹션 매칭 스켈레톤) ── -->
    <div id="state-loading" style="display:none">

      <!-- 원문 스켈레톤 -->
      <div class="sentence-box">
        <div class="skel skel-long"></div>
        <div class="skel skel-mid" style="margin-top:6px"></div>
      </div>

      <!-- 문장 구조 스켈레톤 -->
      <section class="section">
        <div class="section-header">
          <span class="section-title">문장 구조</span>
          <span class="section-hint">Layer 1 — SVOCA</span>
        </div>
        <div class="skel-chips">
          <div class="skel skel-chip"></div>
          <div class="skel skel-chip"></div>
          <div class="skel skel-chip-wide"></div>
          <div class="skel skel-chip"></div>
        </div>
      </section>

      <!-- 번역 스켈레톤 -->
      <section class="section">
        <div class="section-header">
          <span class="section-title">번역</span>
        </div>
        <div class="translation-box">
          <div class="skel skel-long"></div>
          <div class="skel skel-short" style="margin-top:6px"></div>
        </div>
      </section>

      <!-- 단어 스켈레톤 -->
      <section class="section">
        <div class="section-header">
          <span class="section-title">단어</span>
        </div>
        <div class="skel-words">
          <div class="skel skel-word"></div>
          <div class="skel skel-word"></div>
          <div class="skel skel-word"></div>
        </div>
      </section>
    </div>

    <!-- ── 에러 상태 ── -->
    <div id="state-error" class="state" style="display:none">
      <div class="error-icon">⚠️</div>
      <p id="error-msg" class="error-msg"></p>
      <button id="options-btn" class="link-btn" style="display:none">API 키 설정 →</button>
    </div>

    <!-- ── 단어 사전 결과 ── -->
    <div id="state-word-result" class="state" style="display:none">
      <div class="word-card">
        <div id="word-title" class="word-card-title"></div>
        <div id="word-pron" class="word-card-pron"></div>
        <span id="word-pos-badge" class="word-card-pos"></span>
        <div id="word-definition" class="word-card-def"></div>
      </div>
    </div>

    <!-- ── 결과 상태 ── -->
    <div id="state-result" style="display:none">

      <!-- 정제 알림 -->
      <div id="norm-notice" class="norm-notice" style="display:none">
        <span class="norm-badge">✏️ 정제됨</span>
        <span id="norm-notes" class="norm-notes"></span>
      </div>

      <!-- 원문 -->
      <div id="sentence-box" class="sentence-box"></div>

      <!-- 드릴다운 안내 -->
      <div class="drill-notice">Layer 3까지 드롭다운 가능합니다.</div>

      <!-- 문장 구조 -->
      <section class="section">
        <div class="section-header">
          <span class="section-title">문장 구조</span>
          <span class="section-hint">Layer 1 — SVOCA</span>
        </div>
        <div id="grammar-wrap" class="grammar-wrap"></div>
      </section>

      <!-- 번역 -->
      <section class="section">
        <div class="section-header">
          <span class="section-title">번역</span>
        </div>
        <div id="translation-box" class="translation-box"></div>
      </section>

      <!-- 단어 -->
      <section class="section">
        <div class="section-header">
          <span class="section-title">단어</span>
        </div>
        <div id="words-wrap" class="words-wrap"></div>
      </section>

    </div>

  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
